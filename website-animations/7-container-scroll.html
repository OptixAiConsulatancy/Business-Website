<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>7 — Container Scroll Animation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    font-family: 'Inter', sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* spacer so there's room to scroll */
  .spacer { height: 40vh; }
  .spacer-end { height: 60vh; }

  .container {
    height: 180vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .sticky-wrap {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
  }

  /* title */
  .title {
    text-align: center;
    margin-bottom: 2.5rem;
    will-change: transform;
  }
  .title p {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 0.75rem;
  }
  .title h1 {
    font-size: clamp(2.2rem, 5vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.05;
  }
  .title h1 span { color: #7c6dfa; }

  /* card */
  .card {
    width: 100%;
    max-width: 900px;
    height: clamp(320px, 45vh, 520px);
    border-radius: 24px;
    border: 3px solid #3a3a3a;
    background: #1a1a1a;
    padding: 1rem;
    will-change: transform;
    box-shadow:
      0 0 #0000004d,
      0 9px 20px #0000004a,
      0 37px 37px #00000042,
      0 84px 50px #00000026,
      0 149px 60px #0000000a;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    background: #111;
    overflow: hidden;
    position: relative;
  }

  /* mock dashboard inside card */
  .mock-nav {
    height: 44px;
    background: #1c1c1c;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    gap: 0.5rem;
  }
  .mock-dot { width: 10px; height: 10px; border-radius: 50%; }
  .mock-dot:nth-child(1) { background: #ff5f57; }
  .mock-dot:nth-child(2) { background: #febc2e; }
  .mock-dot:nth-child(3) { background: #28c840; }
  .mock-url {
    flex: 1;
    height: 22px;
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    margin: 0 1rem;
  }

  .mock-body {
    display: grid;
    grid-template-columns: 200px 1fr;
    height: calc(100% - 44px);
  }
  .mock-sidebar {
    background: #161616;
    border-right: 1px solid rgba(255,255,255,0.05);
    padding: 1rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .mock-sidebar-item {
    height: 28px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
  }
  .mock-sidebar-item.active {
    background: rgba(124,109,250,0.15);
    border: 1px solid rgba(124,109,250,0.25);
  }
  .mock-content {
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .mock-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
  }
  .mock-stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 0.75rem;
  }
  .mock-stat-label {
    height: 8px;
    width: 60%;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    margin-bottom: 0.5rem;
  }
  .mock-stat-val {
    height: 18px;
    width: 40%;
    border-radius: 4px;
    background: rgba(124,109,250,0.3);
  }
  .mock-chart {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 0.75rem;
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }
  .mock-bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    background: rgba(124,109,250,0.25);
    min-height: 8px;
  }
  .mock-bar.hi { background: rgba(124,109,250,0.6); }
  .mock-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .mock-panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 0.75rem;
  }
  .mock-line {
    height: 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 0.4rem;
  }
  .mock-line.accent { background: rgba(124,109,250,0.3); width: 55%; }

  /* hint */
  .hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.25);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    pointer-events: none;
    animation: bounce 2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(-6px); }
  }

  .back {
    position: fixed;
    top: 1.5rem;
    left: 1.5rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.82rem;
    text-decoration: none;
    letter-spacing: 0.06em;
    z-index: 200;
  }
  .back:hover { color: #fff; }
</style>
</head>
<body>
<script>if (sessionStorage.getItem('anim_auth') !== '1485') { location.href = 'index.html'; }</script>
<a class="back" href="index.html">← Back</a>

<div class="spacer"></div>

<div class="container" id="container">
  <div class="sticky-wrap" id="stickyWrap">
    <div class="title" id="title">
      <p>Automately · Dashboard</p>
      <h1>Your automation hub.<br/><span>Built to scale.</span></h1>
    </div>

    <div class="card" id="card">
      <div class="card-inner">
        <div class="mock-nav">
          <div class="mock-dot"></div>
          <div class="mock-dot"></div>
          <div class="mock-dot"></div>
          <div class="mock-url"></div>
        </div>
        <div class="mock-body">
          <div class="mock-sidebar">
            <div class="mock-sidebar-item active"></div>
            <div class="mock-sidebar-item"></div>
            <div class="mock-sidebar-item"></div>
            <div class="mock-sidebar-item"></div>
            <div class="mock-sidebar-item"></div>
          </div>
          <div class="mock-content">
            <div class="mock-stats">
              <div class="mock-stat"><div class="mock-stat-label"></div><div class="mock-stat-val"></div></div>
              <div class="mock-stat"><div class="mock-stat-label"></div><div class="mock-stat-val"></div></div>
              <div class="mock-stat"><div class="mock-stat-label"></div><div class="mock-stat-val"></div></div>
            </div>
            <div class="mock-chart">
              <div class="mock-bar" style="height:35%"></div>
              <div class="mock-bar" style="height:55%"></div>
              <div class="mock-bar hi" style="height:80%"></div>
              <div class="mock-bar" style="height:45%"></div>
              <div class="mock-bar hi" style="height:90%"></div>
              <div class="mock-bar" style="height:60%"></div>
              <div class="mock-bar" style="height:70%"></div>
              <div class="mock-bar hi" style="height:85%"></div>
            </div>
            <div class="mock-row">
              <div class="mock-panel">
                <div class="mock-line"></div>
                <div class="mock-line accent"></div>
                <div class="mock-line" style="width:80%"></div>
              </div>
              <div class="mock-panel">
                <div class="mock-line"></div>
                <div class="mock-line" style="width:70%"></div>
                <div class="mock-line accent" style="width:45%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="spacer-end"></div>
<p class="hint">↓ scroll to animate</p>

<script>
  const container = document.getElementById('container');
  const card = document.getElementById('card');
  const title = document.getElementById('title');

  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function update() {
    const rect = container.getBoundingClientRect();
    const total = container.offsetHeight - window.innerHeight;
    const scrolled = -rect.top;
    const progress = clamp(scrolled / total, 0, 1);

    const rotateX = lerp(20, 0, progress);
    const scale   = lerp(1.05, 1, progress);
    const titleY  = lerp(0, -80, progress);

    card.style.transform  = `rotateX(${rotateX}deg) scale(${scale})`;
    title.style.transform = `translateY(${titleY}px)`;
  }

  window.addEventListener('scroll', update, { passive: true });
  update();
</script>
</body>
</html>
