<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>8 — Animated Shader Hero</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }
  .overlay { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 2rem; pointer-events: none; }
  .badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.25rem; background: rgba(249,115,22,0.1); border: 1px solid rgba(253,186,116,0.3); border-radius: 100px; font-size: 0.85rem; color: rgba(254,215,170,0.9); margin-bottom: 2.5rem; backdrop-filter: blur(6px); animation: fadeInDown 0.8s ease-out both; }
  h1 { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.02; margin-bottom: 1.5rem; }
  .line1 { display: block; background: linear-gradient(90deg, #fdba74, #facc15, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeInUp 0.8s 0.2s ease-out both; }
  .line2 { display: block; background: linear-gradient(90deg, #fde68a, #fb923c, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: fadeInUp 0.8s 0.4s ease-out both; }
  .subtitle { font-size: clamp(1rem, 2.2vw, 1.3rem); color: rgba(254,215,170,0.8); font-weight: 300; line-height: 1.7; max-width: 680px; margin-bottom: 2.5rem; animation: fadeInUp 0.8s 0.6s ease-out both; }
  .cta-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; pointer-events: all; animation: fadeInUp 0.8s 0.8s ease-out both; }
  .btn-primary { padding: 0.85rem 2.2rem; background: linear-gradient(90deg, #f97316, #eab308); color: #000; border: none; border-radius: 100px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(249,115,22,0.4); }
  .btn-secondary { padding: 0.85rem 2.2rem; background: rgba(249,115,22,0.1); color: rgba(254,215,170,0.9); border: 1px solid rgba(253,186,116,0.3); border-radius: 100px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s, background 0.2s; backdrop-filter: blur(6px); text-decoration: none; }
  .btn-secondary:hover { transform: scale(1.05); background: rgba(249,115,22,0.2); }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .back { position: fixed; top: 1.5rem; left: 1.5rem; color: rgba(255,255,255,0.4); font-size: 0.82rem; text-decoration: none; letter-spacing: 0.06em; z-index: 200; pointer-events: all; }
  .back:hover { color: #fff; }
  .hint { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-size: 0.75rem; letter-spacing: 0.08em; z-index: 200; pointer-events: none; }
</style>
</head>
<body>
<script>if (sessionStorage.getItem('anim_auth') !== '1485') { location.href = 'index.html'; }</script>
<canvas id="glCanvas"></canvas>
<div class="overlay">
  <div class="badge">✨ Trusted by forward-thinking teams</div>
  <h1>
    <span class="line1">Your Business</span>
    <span class="line2">Runs Itself.</span>
  </h1>
  <p class="subtitle">Supercharge productivity with AI-powered automation built for the next generation of Australian businesses — fast, seamless, and limitless.</p>
  <div class="cta-row">
    <a href="#" class="btn-primary">Book a free discovery call</a>
    <a href="#" class="btn-secondary">See how it works →</a>
  </div>
</div>
<a class="back" href="index.html">← Back</a>
<p class="hint">move your mouse to interact</p>
<script>
const canvas = document.getElementById('glCanvas');
const gl = canvas.getContext('webgl2');
const vert = `#version 300 es
precision highp float;
in vec4 position;
void main(){ gl_Position = position; }`;
const frag = `#version 300 es
precision highp float;
out vec4 O;
uniform vec2 resolution;
uniform float time;
uniform vec2 touch;
#define FC gl_FragCoord.xy
#define T time
#define R resolution
#define MN min(R.x,R.y)
float rnd(vec2 p){
  p=fract(p*vec2(12.9898,78.233));
  p+=dot(p,p+34.56);
  return fract(p.x*p.y);
}
float noise(in vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  float a=rnd(i),b=rnd(i+vec2(1,0)),c=rnd(i+vec2(0,1)),d=rnd(i+1.);
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){
  float t=.0,a=1.;mat2 m=mat2(1.,-.5,.2,1.2);
  for(int i=0;i<5;i++){t+=a*noise(p);p*=2.*m;a*=.5;}
  return t;
}
float clouds(vec2 p){
  float d=1.,t=.0;
  for(float i=.0;i<3.;i++){
    float a=d*fbm(i*10.+p.x*.2+.2*(1.+i)*p.y+d+i*i+p);
    t=mix(t,d,a);d=a;p*=2./(i+1.);
  }
  return t;
}
void main(void){
  vec2 uv=(FC-.5*R)/MN, st=uv*vec2(2,1);
  vec3 col=vec3(0);
  float bg=clouds(vec2(st.x+T*.5,-st.y));
  uv*=1.-.3*(sin(T*.2)*.5+.5);
  for(float i=1.;i<12.;i++){
    uv+=.1*cos(i*vec2(.1+.01*i,.8)+i*i+T*.5+.1*uv.x);
    vec2 p=uv;
    float d=length(p);
    col+=.00125/d*(cos(sin(i)*vec3(1,2,3))+1.);
    float b=noise(i+p+bg*1.731);
    col+=.002*b/length(max(p,vec2(b*p.x*.02,p.y)));
    col=mix(col,vec3(bg*.25,bg*.137,bg*.05),d);
  }
  O=vec4(col,1);
}`;
function compile(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,vert));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,frag));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,1,-1,-1,1,1,1,-1]),gl.STATIC_DRAW);
const pos=gl.getAttribLocation(prog,'position');
gl.enableVertexAttribArray(pos);
gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'resolution');
const uTime=gl.getUniformLocation(prog,'time');
const uTouch=gl.getUniformLocation(prog,'touch');
let mouseX=0,mouseY=0;
function resize(){const dpr=Math.max(1,0.5*devicePixelRatio);canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;gl.viewport(0,0,canvas.width,canvas.height);}
window.addEventListener('resize',resize);resize();
window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=innerHeight-e.clientY;});
function loop(now){gl.uniform2f(uRes,canvas.width,canvas.height);gl.uniform1f(uTime,now*0.001);gl.uniform2f(uTouch,mouseX,mouseY);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(loop);}
requestAnimationFrame(loop);
</script>
</body>
</html>
