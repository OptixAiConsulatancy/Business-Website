<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>10 — Lamp Effect</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #020617;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* ── Lamp Scene ── */
  .lamp-scene {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  /* Left beam: triangle spanning from centre-bottom to top-left of viewport */
  .lamp-beam-l {
    position: absolute;
    top: 0;
    right: 50%;
    height: 52vh;
    width: 52vw;
    background: radial-gradient(ellipse at 100% 100%,
      rgba(6,182,212,0.55) 0%,
      rgba(6,182,212,0.08) 45%,
      transparent 68%);
    clip-path: polygon(100% 100%, 0% 0%, 100% 0%);
    transform-origin: right bottom;
    animation: lampBeamExpand 0.9s 0.25s ease-in-out both;
  }

  /* Right beam: mirror */
  .lamp-beam-r {
    position: absolute;
    top: 0;
    left: 50%;
    height: 52vh;
    width: 52vw;
    background: radial-gradient(ellipse at 0% 100%,
      rgba(6,182,212,0.55) 0%,
      rgba(6,182,212,0.08) 45%,
      transparent 68%);
    clip-path: polygon(0% 100%, 0% 0%, 100% 0%);
    transform-origin: left bottom;
    animation: lampBeamExpand 0.9s 0.25s ease-in-out both;
  }

  @keyframes lampBeamExpand {
    from { transform: scaleX(0.04); opacity: 0; }
    to   { transform: scaleX(1);    opacity: 1; }
  }

  /* Large diffuse glow at the line */
  .lamp-glow {
    position: absolute;
    top: 52vh;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(36rem, 72vw);
    height: 10rem;
    border-radius: 50%;
    background: rgba(6,182,212,0.32);
    filter: blur(50px);
    animation: lampGlowAnim 0.9s 0.25s ease-in-out both;
  }

  @keyframes lampGlowAnim {
    from { opacity: 0; transform: translate(-50%, -50%) scaleX(0.12); }
    to   { opacity: 1; transform: translate(-50%, -50%) scaleX(1); }
  }

  /* Bright inner glow */
  .lamp-bright {
    position: absolute;
    top: 52vh;
    left: 50%;
    transform: translate(-50%, -58%);
    width: min(16rem, 30vw);
    height: 8rem;
    border-radius: 50%;
    background: rgba(34,211,238,0.5);
    filter: blur(18px);
    animation: lampBrightAnim 0.9s 0.25s ease-in-out both;
  }

  @keyframes lampBrightAnim {
    from { opacity: 0; transform: translate(-50%, -58%) scaleX(0.12); }
    to   { opacity: 1; transform: translate(-50%, -58%) scaleX(1); }
  }

  /* Horizontal glowing line */
  .lamp-line {
    position: absolute;
    top: 52vh;
    left: 50%;
    transform: translateX(-50%) translateY(-1px);
    height: 2px;
    background: #22d3ee;
    border-radius: 2px;
    box-shadow: 0 0 8px 2px rgba(34,211,238,0.9),
                0 0 28px 10px rgba(6,182,212,0.45);
    animation: lampLineAnim 0.9s 0.25s ease-in-out both;
  }

  @keyframes lampLineAnim {
    from { width: 5rem; opacity: 0; }
    to   { width: min(32rem, 74vw); opacity: 1; }
  }

  /* Dark cover — hides the very top of the beams */
  .lamp-cover {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 18vh;
    background: linear-gradient(to bottom, #020617 35%, transparent);
    z-index: 2;
  }

  /* Dark bottom fade so beams don't bleed too far down */
  .lamp-fade-bottom {
    position: absolute;
    top: 52vh;
    left: 0; right: 0;
    height: 24vh;
    background: linear-gradient(to bottom, transparent 0%, #020617 80%);
    z-index: 2;
  }

  /* ── Content ── */
  .content {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .eyebrow {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(34,211,238,0.7);
    margin-bottom: 2rem;
    animation: textRise 0.75s 0.55s ease-in-out both;
  }

  h1 {
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.08;
    color: #fff;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .h1-inner {
    display: block;
    animation: textRise 0.75s 0.7s ease-in-out both;
  }

  .h1-line2 {
    display: block;
    background: linear-gradient(90deg, #67e8f9, #a5f3fc, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textRise 0.75s 0.9s ease-in-out both;
  }

  .sub {
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.45);
    max-width: 560px;
    line-height: 1.7;
    font-weight: 300;
    animation: textRise 0.75s 1.1s ease-in-out both;
  }

  @keyframes textRise {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Nav hints */
  .back { position: fixed; top: 1.5rem; left: 1.5rem; color: rgba(255,255,255,0.3);
          font-size: 0.82rem; text-decoration: none; letter-spacing: 0.06em; z-index: 200; }
  .back:hover { color: #fff; }
  .hint { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
          color: rgba(255,255,255,0.2); font-size: 0.75rem; letter-spacing: 0.08em;
          pointer-events: none; z-index: 200; }
</style>
</head>
<body>
<script>if (sessionStorage.getItem('anim_auth') !== '1485') { location.href = 'index.html'; }</script>
<a class="back" href="index.html">← Back</a>

<!-- Lamp visual -->
<div class="lamp-scene" aria-hidden="true">
  <div class="lamp-beam-l"></div>
  <div class="lamp-beam-r"></div>
  <div class="lamp-glow"></div>
  <div class="lamp-bright"></div>
  <div class="lamp-line"></div>
  <div class="lamp-cover"></div>
  <div class="lamp-fade-bottom"></div>
</div>

<!-- Content -->
<div class="content">
  <p class="eyebrow">Lamp Effect · Aceternity UI</p>
  <h1>
    <span class="h1-inner">Build lamps</span>
    <span class="h1-line2">the right way.</span>
  </h1>
  <p class="sub">A glowing lamp beam expands from a centre line on load, casting cyan light upward while text rises from below.</p>
</div>

<p class="hint">loads on page open</p>
</body>
</html>
